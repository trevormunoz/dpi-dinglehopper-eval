<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>dpi-eval</title>
<style>body{font-family:system-ui,sans-serif;display:grid;place-items:center;height:100vh;margin:0}</style>
</head>
<body><main><h1>dpi-eval</h1><p id="status" role="status">Setting up…</p></main>
<script>
  (function () {
    var status = document.getElementById('status');
    var friendly = {
      installing: 'Installing components… (first run only, about a minute)',
      ready: 'Starting…'
    };
    var tauri = window.__TAURI__;
    if (tauri && tauri.event && tauri.event.listen) {
      tauri.event.listen('bootstrap-status', function (e) {
        var payload = String(e.payload);
        status.textContent = friendly[payload] || payload;
      });
    }
  })();
</script>
</body>
</html>
