name: desktop
on:
  push:
    branches: [feat/dpi-eval-desktop, main]
    # paths + paths-ignore cannot combine on one event (GitHub docs); a trailing
    # '!' exclusion skips rebuilds for markdown-only changes.
    paths:
      - desktop/**
      - src/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/desktop.yml
      - '!**/*.md'
  workflow_dispatch:

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build runtime payload (probe)
        shell: bash
        run: |
          desktop/runtime/fetch_python.sh
          desktop/runtime/build_wheelhouse.sh --probe
      - name: Offline bootstrap smoke test
        shell: bash
        run: |
          if [ -x desktop/runtime/payload/cpython/bin/python3 ]; then
            PY=desktop/runtime/payload/cpython/bin/python3; BIN=probe-venv/bin
          else
            PY=desktop/runtime/payload/cpython/python.exe; BIN=probe-venv/Scripts
          fi
          "$PY" -m venv probe-venv
          "$BIN/pip" install --no-index --find-links desktop/runtime/payload/wheelhouse --no-deps dpi-dinglehopper-eval
          "$BIN/pip" install --no-index --find-links desktop/runtime/payload/wheelhouse fastapi uvicorn python-multipart lxml
          "$BIN/dpi-eval-web" --help
      - name: Install tauri-cli
        run: cargo install tauri-cli --version '^2' --locked
      - name: Bundle
        working-directory: desktop/src-tauri
        run: cargo tauri build
      # Flatten into dist-artifacts/ so the artifact zip unzips directly to the
      # installer file (upload-artifact otherwise preserves dmg/ and nsis/ dirs).
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find desktop/src-tauri/target/release/bundle -name '*.dmg' -exec cp {} dist-artifacts/ \;
          find desktop/src-tauri/target/release/bundle -name '*setup.exe' -exec cp {} dist-artifacts/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: probe-${{ matrix.os }}
          path: dist-artifacts/*
